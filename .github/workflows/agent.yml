name: Agent

on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - run: npm ci

      - run: npm run agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPEN_BRAIN_URL: ${{ secrets.OPEN_BRAIN_URL }}
          OPEN_BRAIN_KEY: ${{ secrets.OPEN_BRAIN_KEY }}
          AGENT_USER_PROMPT: ${{ vars.AGENT_USER_PROMPT }}
          AGENT_MODEL: ${{ vars.AGENT_MODEL }}
